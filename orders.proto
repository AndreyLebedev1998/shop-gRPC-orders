syntax = "proto3";

package orders;

option go_package = "github.com/AndreyLebedev1998/shop-gRPC-orders/order";

message OrdersStatus {
    int64 id = 1;
    string status = 2;
}

message OrderStatusPaid {
    int64 id = 1;
    string status_paid = 2;
}

message OrderStatusResponse {
    bool response = 1;
    string status = 2;
    int64 id = 3;
}

message OrderId {
    int64 id = 1;
}

message ProductId {
    int64 id = 1;
}

message OrderItem {
    int64 id = 1;
    int64 productId = 2;
    int64 quantity = 3;
}

message OrderItems {
    repeated OrderItem items = 1;
}

message OrderMessage {
    string message = 1;
    bool status = 2;
    int64 id = 3;
}

service OrderService {
    rpc ChangeOrderStatus(OrdersStatus) returns (OrderStatusResponse);
    rpc ChangeOrderStatusPaid(OrderStatusPaid) returns (OrderStatusResponse);
    rpc GetOrderItems(OrderId) returns (OrderItems);
    rpc RemoveOrder(OrderId) returns (OrderMessage);
}
