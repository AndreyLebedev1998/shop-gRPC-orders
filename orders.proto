syntax = "proto3";

package orders;

option go_package = "github.com/AndreyLebedev1998/shop-gRPC-orders/order";

message OrdersStatus {
    int64 id = 1;
    string status = 2;
}

message OrderStatusPaid {
    int64 id = 1;
    string status_paid = 2;
}

message OrderStatusResponse {
    bool response = 1;
    string status = 2;
    int64 id = 3;
}

service OrderService {
    rpc ChangeOrderStatus(OrdersStatus) returns (OrderStatusResponse);
    rpc ChangeOrderStatusPaid(OrderStatusPaid) returns (OrderStatusResponse);
}
